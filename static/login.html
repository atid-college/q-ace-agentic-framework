<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-ACE | Login</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full" x-data="loginForm">
        <div
            class="bg-white rounded-[2.5rem] shadow-2xl shadow-indigo-100 p-12 border border-slate-100 relative overflow-hidden">
            <!-- Decorative blobs -->
            <div class="absolute -top-12 -right-12 w-48 h-48 bg-indigo-50 rounded-full blur-3xl opacity-60"></div>
            <div class="absolute -bottom-12 -left-12 w-48 h-48 bg-purple-50 rounded-full blur-3xl opacity-60"></div>

            <div class="relative z-10 space-y-10">
                <div class="flex flex-col items-center space-y-4">
                    <div class="bg-indigo-600 text-white p-4 rounded-2xl shadow-xl shadow-indigo-200">
                        <i data-lucide="shield-check" class="w-10 h-10"></i>
                    </div>
                    <div class="text-center">
                        <h1 class="text-3xl font-black text-slate-800 tracking-tight">Q-ACE</h1>
                        <p class="text-slate-400 font-medium text-sm mt-1 uppercase tracking-widest">Agentic QA Platform
                        </p>
                    </div>
                </div>

                <form @submit.prevent="handleLogin" class="space-y-6">
                    <div class="space-y-2">
                        <label
                            class="block text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] pl-1">Username</label>
                        <div class="relative group">
                            <span
                                class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 group-focus-within:text-indigo-500 transition-colors">
                                <i data-lucide="user" class="w-4 h-4"></i>
                            </span>
                            <input type="text" x-model="username" required
                                class="w-full bg-slate-50 border border-slate-200 rounded-2xl pl-12 pr-6 py-4 text-sm focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 focus:bg-white outline-none transition-all"
                                placeholder="Enter your username">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label
                            class="block text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] pl-1">Password</label>
                        <div class="relative group">
                            <span
                                class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 group-focus-within:text-indigo-500 transition-colors">
                                <i data-lucide="lock" class="w-4 h-4"></i>
                            </span>
                            <input type="password" x-model="password" required
                                class="w-full bg-slate-50 border border-slate-200 rounded-2xl pl-12 pr-6 py-4 text-sm focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 focus:bg-white outline-none transition-all"
                                placeholder="••••••••">
                        </div>
                    </div>

                    <div x-show="error" x-transition
                        class="p-4 bg-rose-50 border border-rose-100 text-rose-600 text-xs font-bold rounded-xl flex items-center space-x-2">
                        <i data-lucide="alert-circle" class="w-4 h-4"></i>
                        <span x-text="error"></span>
                    </div>

                    <button type="submit" :disabled="loading"
                        class="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-indigo-600 active:scale-[0.98] transition-all flex items-center justify-center space-x-3 disabled:opacity-50">
                        <template x-if="!loading">
                            <span>Sign In</span>
                        </template>
                        <template x-if="loading">
                            <svg class="animate-spin h-5 w-5 text-current" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                    stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor"
                                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                </path>
                            </svg>
                        </template>
                    </button>
                </form>

                <div class="text-center pt-2">
                    <p class="text-[10px] text-slate-400 font-medium">Internal QA Framework Access Only</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('loginForm', () => ({
                username: '',
                password: '',
                error: '',
                loading: false,
                async handleLogin() {
                    this.loading = true;
                    this.error = '';
                    try {
                        const response = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            credentials: 'same-origin',
                            body: JSON.stringify({ username: this.username, password: this.password })
                        });

                        const data = await response.json();

                        if (response.ok && data.status === 'success') {
                            window.location.href = '/';
                        } else {
                            this.error = data.message || data.detail || 'Login failed';
                        }
                    } catch (e) {
                        this.error = 'Network error. Please try again.';
                    } finally {
                        this.loading = false;
                        this.$nextTick(() => lucide.createIcons());
                    }
                }

            }));
            lucide.createIcons();
        });
    </script>
</body>

</html>
