<div class="space-y-6" x-data="mobileAgentTool()">
    <!-- Tool Header & Tabs -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="p-6 border-b border-slate-100 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div class="flex items-center space-x-4">
                <div class="bg-emerald-600 p-3 rounded-2xl shadow-lg shadow-emerald-100">
                    <i data-lucide="smartphone" class="w-6 h-6 text-white text-emerald-100"></i>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-slate-800">Mobile Agent</h2>
                    <div class="flex items-center space-x-2">
                        <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-emerald-100 text-emerald-800">Powered by Appium</span>
                    </div>
                </div>
            </div>

            <!-- Tab Navigation -->
            <div class="flex items-center bg-slate-50 p-1 rounded-xl border border-slate-200">
                <button @click="switchTab('task')"
                    :class="activeTab === 'task' ? 'bg-white shadow-sm text-emerald-600' : 'text-slate-500 hover:text-slate-700'"
                    class="px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center space-x-2">
                    <i data-lucide="play-circle" class="w-4 h-4"></i>
                    <span>Task Execution</span>
                </button>
                <button @click="switchTab('config')"
                    :class="activeTab === 'config' ? 'bg-white shadow-sm text-emerald-600' : 'text-slate-500 hover:text-slate-700'"
                    class="px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center space-x-2">
                    <i data-lucide="settings-2" class="w-4 h-4"></i>
                    <span>Appium Config</span>
                </button>
            </div>
        </div>

        <!-- Tab Contents -->
        <div class="p-6">
            <!-- TASK EXECUTION TAB -->
            <div x-show="activeTab === 'task'" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-y-2">
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                    <!-- Left: Control Panel -->
                    <div class="lg:col-span-12 space-y-4">
                        <div class="relative group">
                            <textarea x-model="task" rows="3"
                                class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-5 text-sm focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none transition-all placeholder-slate-400 group-hover:border-slate-300 resize-none"
                                placeholder="What should the mobile agent do? (e.g., Open the app, login as 'user1', and verify the home screen title)"></textarea>

                            <div class="absolute bottom-4 right-4 flex items-center space-x-2">
                                <button @click="task = ''" class="p-2 text-slate-400 hover:text-rose-500 transition-colors" title="Clear task">
                                    <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Actions - Utilizing modern Gradients -->
                        <div class="flex items-center space-x-3 pt-2">
                            <button @click="startAgent()" :disabled="status === 'running' || !task.trim()"
                                class="flex-grow md:flex-grow-0 md:px-10 py-4 bg-gradient-to-r from-emerald-500 to-indigo-600 text-white rounded-2xl font-bold hover:from-emerald-600 hover:to-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-lg shadow-emerald-100 flex items-center justify-center space-x-2">
                                <template x-if="status !== 'running'">
                                    <span class="flex items-center space-x-2">
                                        <i data-lucide="play" class="w-5 h-5 fill-current"></i>
                                        <span>Start Mobile Agent</span>
                                    </span>
                                </template>
                                <template x-if="status === 'running'">
                                    <span class="flex items-center space-x-2">
                                        <svg class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24">
                                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                        </svg>
                                        <span>Mobile Agent Working...</span>
                                    </span>
                                </template>
                            </button>
                            <button x-show="status === 'running'" @click="stopAgent()"
                                class="p-4 bg-rose-50 text-rose-600 rounded-2xl hover:bg-rose-100 transition-all border border-rose-100">
                                <i data-lucide="square" class="w-6 h-6 fill-current"></i>
                            </button>
                            <button @click="clearLogs()"
                                class="px-6 py-4 text-slate-500 hover:text-slate-800 font-semibold transition-colors">
                                Clear Terminal
                            </button>
                        </div>
                    </div>

                    <!-- Console / Output area -->
                    <div class="lg:col-span-12">
                        <!-- Final Result Overlay -->
                        <div x-show="finalResult" x-transition class="mb-6 p-5 bg-emerald-600 rounded-2xl border border-emerald-500 shadow-xl animate-in fade-in slide-in-from-bottom-2">
                            <div class="flex justify-between items-start mb-3">
                                <span class="text-[10px] font-bold text-emerald-200 uppercase tracking-widest flex items-center">
                                    <i data-lucide="check-circle-2" class="w-3.5 h-3.5 mr-2"></i> Final Agent Result
                                </span>
                                <button @click="finalResult = ''" class="text-emerald-200 hover:text-white transition-colors bg-emerald-700/50 hover:bg-emerald-700 p-1.5 rounded-lg">
                                    <i data-lucide="x" class="w-4 h-4"></i>
                                </button>
                            </div>
                            <div class="text-sm font-medium text-white leading-relaxed whitespace-pre-wrap" x-text="finalResult"></div>
                        </div>

                        <div class="bg-slate-900 rounded-2xl border border-slate-800 shadow-2xl relative overflow-hidden flex flex-col h-[500px]">
                            <!-- Console Header -->
                            <div class="px-5 py-3 border-b border-slate-800 bg-slate-900/50 flex items-center justify-between">
                                <div class="flex items-center space-x-2">
                                    <div class="flex space-x-1.5 mr-4">
                                        <div class="w-2.5 h-2.5 rounded-full bg-rose-500"></div>
                                        <div class="w-2.5 h-2.5 rounded-full bg-amber-500"></div>
                                        <div class="w-2.5 h-2.5 rounded-full bg-emerald-500"></div>
                                    </div>
                                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest flex items-center">
                                        <i data-lucide="terminal" class="w-3 h-3 mr-2"></i>
                                        Live Appium Execution Logs
                                    </span>
                                </div>
                            </div>

                            <!-- Console Body -->
                            <div id="mobile-agent-console" class="flex-grow overflow-y-auto p-6 font-mono text-xs space-y-2 scroll-smooth">
                                <template x-if="logs.length === 0">
                                    <div class="h-full flex flex-col items-center justify-center space-y-4 opacity-30 select-none">
                                        <i data-lucide="ghost" class="w-12 h-12 text-slate-500"></i>
                                        <p class="text-sm font-medium">Ready for input...</p>
                                    </div>
                                </template>
                                <template x-for="(log, idx) in logs" :key="idx">
                                    <div class="flex items-start space-x-3 group animate-in slide-in-from-left duration-300"
                                        :class="{'text-emerald-400': log.type === 'done', 'text-rose-400': log.type === 'error', 'text-slate-300': log.type === 'step'}">
                                        <span class="text-slate-600 select-none shrink-0" x-text="String(idx + 1).padStart(3, '0')"></span>
                                        <span class="leading-relaxed break-words" x-text="log.text"></span>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- CONFIGURATION TAB -->
            <div x-show="activeTab === 'config'" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-y-2">
                <div class="bg-slate-50 rounded-2xl border border-slate-200 overflow-hidden p-8 animate-in fade-in duration-300">
                    <h3 class="text-lg font-bold text-slate-800 mb-6">Appium Connection Panel</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-2">
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest">Appium Server URL</label>
                            <input type="text" x-model="appiumConfig.serverUrl"
                                class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-emerald-500/20 outline-none transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest">Platform Name</label>
                            <select x-model="appiumConfig.platformName"
                                class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-emerald-500/20 outline-none transition-all">
                                <option value="Android">Android</option>
                                <option value="iOS">iOS</option>
                            </select>
                        </div>
                        <div class="space-y-2 md:col-span-2">
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest">Device UDID</label>
                            <input type="text" x-model="appiumConfig.udid" placeholder="Optional for single device"
                                class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-emerald-500/20 outline-none transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest">App Package</label>
                            <input type="text" x-model="appiumConfig.appPackage" placeholder="e.g. com.example.app"
                                class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-emerald-500/20 outline-none transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest">App Activity</label>
                            <input type="text" x-model="appiumConfig.appActivity" placeholder="e.g. .MainActivity"
                                class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-emerald-500/20 outline-none transition-all">
                        </div>
                    </div>
                    <!-- Save Button -->
                    <div class="mt-8 flex justify-end">
                        <button @click="saveConfig()"
                            class="px-8 py-3 bg-emerald-600 text-white rounded-xl font-bold hover:bg-emerald-700 transition-all shadow-lg shadow-emerald-100 flex items-center space-x-2 transform active:scale-95">
                            <i data-lucide="save" class="w-5 h-5"></i>
                            <span>Save Configuration</span>
                        </button>
                    </div>

                    <!-- Notice about keeping settings preserved -->
                    <div class="mt-8 p-4 bg-indigo-50 border border-indigo-100 rounded-xl flex items-start space-x-3">
                        <i data-lucide="info" class="w-5 h-5 text-indigo-500 mt-0.5"></i>
                        <p class="text-xs text-indigo-800">Configurations are now stored securely in the system database and will persist across sessions.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Custom Warning / Error Modal using modern design -->
        <div x-show="showErrorModal" class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50">
            <div @click.away="showErrorModal = false" class="bg-white rounded-3xl p-8 max-w-sm w-full mx-4 shadow-2xl transform transition-all animate-in zoom-in-95 duration-200">
                <div class="flex items-center space-x-4 mb-6">
                    <div class="bg-rose-100 p-3 rounded-2xl">
                        <i data-lucide="alert-triangle" class="w-8 h-8 text-rose-600"></i>
                    </div>
                    <h3 class="text-xl font-bold text-slate-800">Connection Failed</h3>
                </div>
                <p class="text-sm text-slate-600 mb-8 leading-relaxed" x-text="errorMessage"></p>
                <div class="flex justify-end">
                    <button @click="showErrorModal = false" class="px-6 py-2.5 bg-rose-600 text-white font-bold rounded-xl hover:bg-rose-700 transition-colors shadow-lg shadow-rose-200">
                        Acknowledge
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
