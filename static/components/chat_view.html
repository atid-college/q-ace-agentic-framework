<div class="h-full flex gap-8 animate-in fade-in duration-700">
    <!-- Left Sidebar: Recent Chats -->
    <div class="w-64 flex flex-col h-full bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-hidden flex-shrink-0">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center">
            <h3 class="font-bold text-slate-800 text-sm italic">Recent History</h3>
            <button @click="createChatSession()" class="text-indigo-600 hover:text-indigo-800 p-1">
                <i data-lucide="plus-circle" class="w-4 h-4"></i>
            </button>
        </div>
        <div class="flex-grow overflow-y-auto p-4 space-y-4">
            <!-- Example Flows Section -->
            <div class="space-y-2">
                <label class="text-[10px] font-black text-indigo-400 uppercase tracking-widest pl-2">Example Flows</label>
                <div class="space-y-1">
                    <template x-for="chat in chatSessions.filter(c => c.title.includes('Flow') || c.title.includes('Automation')).slice(0, 5)" :key="chat.id">
                        <button @click="switchChatSession(chat.id)"
                            :class="currentSessionId === chat.id ? 'bg-indigo-50 border-indigo-200 text-indigo-700' : 'border-transparent text-slate-500 hover:bg-slate-50'"
                            class="w-full text-left px-3 py-2.5 rounded-xl border text-xs font-medium transition-all truncate"
                            x-text="chat.title"></button>
                    </template>
                </div>
            </div>

            <!-- All Chats Section -->
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-2">All Chats</label>
                <div class="space-y-1">
                    <template x-for="chat in chatSessions.filter(c => !c.title.includes('Flow') && !c.title.includes('Automation'))" :key="chat.id">
                        <div class="group flex items-center gap-1">
                            <button @click="switchChatSession(chat.id)"
                                :class="currentSessionId === chat.id ? 'bg-indigo-50 border-indigo-200 text-indigo-700' : 'border-transparent text-slate-500 hover:bg-slate-50'"
                                class="flex-grow text-left px-3 py-2.5 rounded-xl border text-xs font-medium transition-all truncate"
                                x-text="chat.title"></button>
                            <button @click="deleteChatSession(chat.id)" 
                                class="opacity-0 group-hover:opacity-100 p-2 text-rose-400 hover:bg-rose-50 rounded-lg transition-all">
                                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                            </button>
                        </div>
                    </template>
                    <div x-show="chatSessions.length === 0" class="text-[10px] text-slate-400 italic px-2 py-2 text-center">No chats yet</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Middle Pane: Conversation & Workflow -->
    <div class="flex-grow flex flex-col min-w-0 h-full">
        <!-- Chat History -->
        <div id="chat-history"
            class="flex-grow overflow-y-auto space-y-6 mb-6 p-8 rounded-[2.5rem] bg-white shadow-sm border border-slate-200">
            
            <!-- Empty State / Landing Page -->
            <div x-show="chatHistory.length === 0" class="flex flex-col items-center justify-center h-full text-center p-8 animate-in fade-in zoom-in duration-700">
                <div class="relative w-full max-w-2xl rounded-[3rem] overflow-hidden shadow-2xl mb-8 group">
                    <div class="absolute inset-0 bg-indigo-900/40 group-hover:bg-indigo-900/20 transition-colors z-10"></div>
                    <img src="https://plus.unsplash.com/premium_photo-1683121710572-7723bd2e235d?fm=jpg&q=60&w=3000&auto=format&fit=crop" 
                         alt="AI Neural Network" 
                         class="w-full h-64 object-cover transform group-hover:scale-105 transition-transform duration-700">
                    <div class="absolute inset-0 flex flex-col items-center justify-center z-20 opacity-80 mix-blend-overlay">
                        <i data-lucide="bot" class="w-24 h-24 text-white drop-shadow-2xl"></i>
                    </div>
                </div>
                
                <h2 class="text-4xl font-black text-slate-800 tracking-tight mb-4">
                    Welcome to <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600">Q-ACE</span>
                </h2>
                <p class="text-lg text-slate-500 max-w-xl mx-auto mb-10 leading-relaxed font-medium">
                    Your intelligent agentic orchestration platform. Build complex QA workflows, execute autonomous analyses, and integrate tools seamlessly via natural language.
                </p>
                
                <div class="flex flex-wrap justify-center gap-3 max-w-3xl">
                    <button @click="chatPrompt = 'Analyze the login-spec.pdf and generate automation scripts for Jenkins.'" 
                        class="px-5 py-3 rounded-full bg-indigo-50 text-indigo-700 text-sm font-bold border border-indigo-100 hover:bg-indigo-100 transition-colors">
                        PDF to Pipeline Spec
                    </button>
                    <button @click="chatPrompt = 'Fetch the latest user creation API and use AI to validate the schema.'" 
                        class="px-5 py-3 rounded-full bg-purple-50 text-purple-700 text-sm font-bold border border-purple-100 hover:bg-purple-100 transition-colors">
                        Auto API Validation
                    </button>
                    <button @click="chatPrompt = 'Run a full end-to-end regression suite and open Jira bugs for any failures.'" 
                        class="px-5 py-3 rounded-full bg-emerald-50 text-emerald-700 text-sm font-bold border border-emerald-100 hover:bg-emerald-100 transition-colors">
                        E2E Regression Chain
                    </button>
                </div>
            </div>
            <template x-for="msg in chatHistory">
                <div class="space-y-4">
                    <!-- Standard Text Message -->
                    <template x-if="!msg.type || msg.type === 'text'">
                        <div class="flex" :class="msg.role === 'user' ? 'justify-end' : 'justify-start'">
                            <div class="max-w-[85%] rounded-[2rem] px-6 py-4 shadow-sm"
                                :class="msg.role === 'user' ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-slate-50 text-slate-800 rounded-tl-none ring-1 ring-slate-100'">
                                <p class="text-sm leading-relaxed whitespace-pre-wrap" x-text="msg.content"></p>
                            </div>
                        </div>
                    </template>

                    <!-- Workflow/Orchestration Step -->
                    <template x-if="msg.type === 'workflow'">
                        <div
                            class="bg-slate-900 rounded-[2.5rem] p-8 shadow-2xl space-y-6 border border-slate-800 relative overflow-hidden group">
                            <!-- Background Accent -->
                            <div class="absolute top-0 right-0 w-64 h-64 bg-indigo-500/10 blur-[100px] -mr-32 -mt-32">
                            </div>

                            <div class="flex justify-between items-start relative z-10">
                                <div class="space-y-1">
                                    <div class="flex items-center gap-2">
                                        <div class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></div>
                                        <span
                                            class="text-[10px] font-black text-indigo-400 uppercase tracking-[0.2em]">Active
                                            Orchestration</span>
                                    </div>
                                    <h4 class="text-xl font-bold text-white" x-text="msg.content?.title || msg.title || ''"></h4>
                                </div>
                                <span
                                    class="px-3 py-1 bg-white/10 text-white rounded-full text-[10px] font-bold uppercase tracking-wider border border-white/10"
                                    x-text="msg.content?.status || msg.status || ''"></span>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 relative z-10">
                                <template x-for="step in (msg.content?.steps || msg.steps || [])" :key="step.id">
                                    <div @click="selectedArtifact = { id: step.id, title: step.label, tool: step.tool, mockResult: getStepResult(step), logs: step.logs || [] }"
                                        class="p-4 rounded-2xl border transition-all cursor-pointer group/step"
                                        :class="step.status === 'completed' ? 'bg-white/5 border-white/10 hover:bg-white/10' : 'bg-transparent border-white/5 opacity-50'">
                                        <div class="flex items-center justify-between gap-3">
                                            <div class="flex items-center gap-3">
                                                <div
                                                    class="w-8 h-8 rounded-lg flex items-center justify-center bg-indigo-500/20 text-indigo-400 group-hover/step:scale-110 transition-transform">
                                                    <i :data-lucide="(step.tool === 'ai' || !step.tool) ? 'sparkles' : 'terminal'"
                                                        class="w-4 h-4"></i>
                                                </div>
                                                <span
                                                    class="text-sm font-bold text-slate-300 group-hover/step:text-white transition-colors"
                                                    x-text="step.label"></span>
                                            </div>
                                            <template x-if="step.status === 'completed'">
                                                <i data-lucide="check-circle-2" class="w-4 h-4 text-emerald-500"></i>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
        </div>

        <!-- Input Area -->
        <div class="relative group">
            <form @submit.prevent="sendChat" class="flex items-end space-x-4">
                <div
                    class="flex-grow bg-white border-2 border-slate-100 rounded-[2rem] shadow-xl shadow-slate-100/50 focus-within:border-indigo-500 transition-all duration-300 px-2 py-2">
                    <textarea x-model="chatPrompt" rows="1" @keydown.enter.prevent="sendChat"
                        placeholder="Instruct your agent to perform complex workflows..."
                        class="w-full bg-transparent border-none focus:ring-0 focus:outline-none outline-none resize-none px-6 py-4 text-sm font-medium text-slate-700"></textarea>
                </div>
                <button type="submit"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white p-5 rounded-[1.5rem] shadow-2xl shadow-indigo-100 transition-all active:scale-90 group-hover:rotate-6">
                    <i data-lucide="send" class="w-6 h-6"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Right Pane: Artifact Inspector -->
    <div x-show="selectedArtifact" x-cloak
        class="w-full lg:w-[400px] h-full bg-white rounded-[2.5rem] border border-slate-200 shadow-sm flex flex-col animate-in slide-in-from-right duration-500 flex-shrink-0">
        <div class="p-8 border-b border-slate-100 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-50 p-2 rounded-xl text-indigo-600">
                    <i data-lucide="file-text" class="w-5 h-5"></i>
                </div>
                <h3 class="font-bold text-slate-800 text-sm" x-text="selectedArtifact?.title"></h3>
            </div>
            <button @click="selectedArtifact = null"
                class="text-slate-400 hover:text-slate-600 p-2 hover:bg-slate-50 rounded-full transition-all">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <div class="flex-grow overflow-y-auto p-8 space-y-8">
            <!-- Detailed Activity Console -->
            <div class="space-y-4" x-show="selectedArtifact?.logs && selectedArtifact.logs.length > 0">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-1">Detailed Activity Console</label>
                <div class="bg-slate-900 rounded-2xl p-4 font-mono text-[9px] text-indigo-300 leading-tight border border-slate-700 h-64 overflow-y-auto shadow-inner custom-scrollbar">
                    <template x-for="log in (selectedArtifact?.logs || [])">
                        <div class="py-1 border-b border-white/5 last:border-0 opacity-80 hover:opacity-100 transition-opacity" x-text="log"></div>
                    </template>
                </div>
            </div>

            <div class="space-y-4">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-1">Step Data / Output</label>
                <div
                    class="bg-slate-50 rounded-2xl p-6 font-mono text-xs text-slate-600 leading-relaxed border border-slate-100">
                    <pre class="whitespace-pre-wrap" x-text="selectedArtifact?.mockResult ? selectedArtifact.mockResult : `Final result from [ ${selectedArtifact?.tool} ] will be displayed here.\n\nSelect a completed step to view its output.`"></pre>
                </div>
            </div>
        </div>
    </div>


</div>
