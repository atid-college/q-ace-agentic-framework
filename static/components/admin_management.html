<div class="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-700" x-data="adminManagement">

    <!-- Modern Notification Modal -->
    <div x-show="modalNotice.show" x-cloak
        class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center z-[100] p-6 text-center">
        <div class="bg-white rounded-[2.5rem] p-12 max-w-sm w-full shadow-2xl space-y-6 animate-in zoom-in-95 duration-200"
            @click.away="modalNotice.show = false">
            <div :class="modalNotice.type === 'error' ? 'bg-rose-50' : 'bg-indigo-50'"
                class="w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-8">
                <template x-if="modalNotice.type !== 'error'">
                    <i data-lucide="check-circle-2" class="w-10 h-10 text-indigo-600"></i>
                </template>
                <template x-if="modalNotice.type === 'error'">
                    <i data-lucide="alert-circle" class="w-10 h-10 text-rose-600"></i>
                </template>
            </div>
            <h3 class="text-2xl font-black text-slate-800" x-text="modalNotice.title"></h3>
            <p class="text-slate-500 leading-relaxed" x-text="modalNotice.message"></p>
            <button @click="modalNotice.show = false"
                class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-slate-800 transition-all active:scale-[0.98]">
                Dismiss
            </button>
        </div>
    </div>

    <!-- Modern Confirmation Modal -->
    <div x-show="confirmNotice.show" x-cloak
        class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center z-[100] p-6 text-center">
        <div class="bg-white rounded-[2.5rem] p-12 max-w-sm w-full shadow-2xl space-y-6 animate-in zoom-in-95 duration-200"
            @click.away="confirmNotice.show = false">
            <div class="w-20 h-20 bg-amber-50 rounded-3xl flex items-center justify-center mx-auto mb-8">
                <i data-lucide="help-circle" class="w-10 h-10 text-amber-600"></i>
            </div>
            <h3 class="text-2xl font-black text-slate-800" x-text="confirmNotice.title"></h3>
            <p class="text-slate-500 leading-relaxed" x-text="confirmNotice.message"></p>
            <div class="grid grid-cols-2 gap-4 pt-4">
                <button @click="confirmNotice.show = false"
                    class="bg-slate-100 text-slate-600 py-4 rounded-2xl font-bold hover:bg-slate-200 transition-all">
                    Cancel
                </button>
                <button @click="confirmNotice.onConfirm()"
                    class="bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100">
                    Confirm
                </button>
            </div>
        </div>
    </div>

    <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
        <div>
            <h2 class="text-3xl font-bold text-slate-800">User & Group Management</h2>
            <p class="text-slate-500 mt-1">Manage platform access, roles, and group permissions.</p>
        </div>
        <div class="flex gap-4">
            <button @click="showAddGroup = true"
                class="bg-white text-slate-700 px-6 py-3 rounded-2xl font-bold border border-slate-200 shadow-sm hover:bg-slate-50 transition-all flex items-center space-x-2">
                <i data-lucide="folder-plus" class="w-5 h-5"></i>
                <span>New Group</span>
            </button>
            <button @click="showAddUser = true"
                class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold flex items-center space-x-2 shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all">
                <i data-lucide="user-plus" class="w-5 h-5"></i>
                <span>Add User</span>
            </button>
        </div>
    </div>

    <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
        <!-- Groups & Permissions -->
        <div class="xl:col-span-1 bg-white rounded-[2.5rem] p-8 border border-slate-200 shadow-sm space-y-8">
            <div class="flex items-center space-x-3 pb-4 border-b border-slate-100">
                <div class="bg-indigo-50 p-2 rounded-xl">
                    <i data-lucide="shield" class="w-5 h-5 text-indigo-600"></i>
                </div>
                <h3 class="text-lg font-bold text-slate-800">Groups</h3>
            </div>

            <div class="space-y-4 max-h-[600px] overflow-y-auto pr-2">
                <template x-for="group in groups" :key="group.id">
                    <div
                        class="p-6 bg-slate-50 rounded-2xl border border-slate-100 space-y-4 relative group hover:border-indigo-200 transition-all">

                        <div class="flex flex-col gap-4">
                            <!-- Group Header with Actions -->
                            <div class="flex justify-between items-center">
                                <span class="font-bold text-slate-700 text-lg" x-text="group.name"></span>
                                <div class="flex items-center gap-2">
                                    <button @click="openEditGroup(group)"
                                        class="p-2 text-slate-400 hover:text-indigo-600 hover:bg-white rounded-xl transition-all">
                                        <i data-lucide="edit-3" class="w-5 h-5"></i>
                                    </button>
                                    <button @click="deleteGroup(group.id)"
                                        class="p-2 text-slate-400 hover:text-rose-600 hover:bg-white rounded-xl transition-all">
                                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Badges -->
                            <div class="flex items-center gap-2">
                                <span
                                    class="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-2.5 py-1 bg-white border border-slate-200 rounded-full h-fit flex items-center"
                                    x-text="group.tools.length + ' Tools'"></span>
                                <div class="flex-1 overflow-hidden">
                                    <div class="flex flex-wrap gap-1.5">
                                        <template x-for="tool in group.tools" :key="tool">
                                            <span
                                                class="text-[9px] font-bold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-md border border-indigo-100 whitespace-nowrap"
                                                x-text="tool"></span>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- Users List -->
        <div class="xl:col-span-2 bg-white rounded-[2.5rem] p-8 border border-slate-200 shadow-sm space-y-8">
            <div class="flex items-center space-x-3 pb-4 border-b border-slate-100">
                <div class="bg-purple-50 p-2 rounded-xl">
                    <i data-lucide="users" class="w-5 h-5 text-purple-600"></i>
                </div>
                <h3 class="text-lg font-bold text-slate-800">System Users</h3>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr
                            class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em] border-b border-slate-100">
                            <th class="pb-4 pl-2 text-center">ID</th>
                            <th class="pb-4">User</th>
                            <th class="pb-4">Role</th>
                            <th class="pb-4">Group</th>
                            <th class="pb-4 text-right pr-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        <template x-for="user in users" :key="user.id">
                            <tr class="group hover:bg-slate-50 transition-all">
                                <td class="py-4 pl-2 text-center">
                                    <span class="px-2 py-1 bg-slate-100 text-slate-500 rounded-lg text-xs font-mono"
                                        x-text="'#' + user.id"></span>
                                </td>
                                <td class="py-4 font-bold text-slate-700" x-text="user.username"></td>
                                <td class="py-4">
                                    <span
                                        :class="user.role === 'admin' ? 'bg-amber-50 text-amber-700 border-amber-100' : 'bg-slate-100 text-slate-600 border-slate-200'"
                                        class="text-[10px] font-bold uppercase px-2 py-1 rounded-full border"
                                        x-text="user.role"></span>
                                </td>
                                <td class="py-4">
                                    <div class="flex items-center space-x-2">
                                        <div class="w-2 h-2 rounded-full bg-indigo-400"></div>
                                        <span class="text-sm text-slate-600 font-medium"
                                            x-text="user.group_name || 'Individual'"></span>
                                    </div>
                                </td>
                                <td class="py-4 text-right pr-4">
                                    <div class="flex justify-end gap-2">
                                        <button @click="openEditUser(user)"
                                            class="p-2 text-slate-300 hover:text-indigo-500 hover:bg-indigo-50 rounded-xl transition-all">
                                            <i data-lucide="edit-3" class="w-4 h-4"></i>
                                        </button>
                                        <button @click="deleteUser(user.id)"
                                            class="p-2 text-slate-300 hover:text-rose-500 hover:bg-rose-50 rounded-xl transition-all">
                                            <i data-lucide="user-minus" class="w-4 h-4"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add Group Modal -->
    <div x-show="showAddGroup" x-cloak
        class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-6">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-2xl w-full shadow-2xl space-y-8 animate-in zoom-in-95 duration-200"
            @click.away="showAddGroup = false">
            <div class="flex justify-between items-center">
                <div>
                    <h3 class="text-2xl font-black text-slate-800">Create New Group</h3>
                    <p class="text-slate-400 text-sm">Define group permissions and access levels.</p>
                </div>
                <button @click="showAddGroup = false"
                    class="text-slate-400 hover:text-slate-600 p-2 hover:bg-slate-100 rounded-full transition-all">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <form @submit.prevent="addGroup" class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-2">Group
                            Name</label>
                        <input type="text" x-model="newGroup.name"
                            class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3.5 text-sm focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all"
                            placeholder="e.g. QA Automation">
                    </div>
                    <div class="space-y-2">
                        <label
                            class="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-2">Description</label>
                        <input type="text" x-model="newGroup.description"
                            class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3.5 text-sm focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all"
                            placeholder="Team scope...">
                    </div>
                </div>

                <div class="space-y-4">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-2">Select Accessible
                        Tools</label>
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                        <template x-for="tool in availableTools" :key="tool.id">
                            <button type="button" @click="toggleTool(tool.id, false)"
                                :class="newGroup.tools.includes(tool.id) ? 'bg-indigo-600 text-white border-indigo-600 shadow-lg shadow-indigo-100' : 'bg-slate-50 text-slate-600 border-slate-200 hover:border-indigo-300'"
                                class="p-4 rounded-xl border text-[10px] font-bold uppercase tracking-tight transition-all text-center"
                                x-text="tool.name">
                            </button>
                        </template>
                    </div>
                </div>

                <button type="submit"
                    class="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold hover:bg-slate-900 transition-all shadow-xl active:scale-[0.98]">
                    Register Group
                </button>
            </form>
        </div>
    </div>

    <!-- Add User Modal -->
    <div x-show="showAddUser" x-cloak
        class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-6">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-lg w-full shadow-2xl space-y-8 animate-in zoom-in-95 duration-200"
            @click.away="showAddUser = false">
            <div class="flex justify-between items-center">
                <h3 class="text-2xl font-black text-slate-800">Add New User</h3>
                <button @click="showAddUser = false"
                    class="text-slate-400 hover:text-slate-600 p-2 hover:bg-slate-100 rounded-full transition-all">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <form @submit.prevent="addUser" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-2">Username</label>
                    <input type="text" x-model="newUser.username"
                        class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3.5 text-sm outline-none focus:border-indigo-500 transition-all"
                        placeholder="e.g. j.doe">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-2">Initial
                        Password</label>
                    <input type="password" x-model="newUser.password"
                        class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3.5 text-sm outline-none focus:border-indigo-500 transition-all"
                        placeholder="••••••••">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-2">Role</label>
                        <select x-model="newUser.role"
                            class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3.5 text-sm outline-none appearance-none cursor-pointer">
                            <option value="user">User</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-2">Group</label>
                        <select x-model="newUser.group_id"
                            class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3.5 text-sm outline-none appearance-none cursor-pointer">
                            <template x-for="g in groups" :key="g.id">
                                <option :value="g.id" x-text="g.name"></option>
                            </template>
                        </select>
                    </div>
                </div>
                <button type="submit"
                    class="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold hover:bg-slate-900 transition-all shadow-xl active:scale-[0.98]">
                    Register User
                </button>
            </form>
        </div>
    </div>

    <!-- Edit Group Modal -->
    <div x-show="showEditGroup" x-cloak
        class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-6">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-2xl w-full shadow-2xl space-y-8 animate-in zoom-in-95 duration-200"
            @click.away="showEditGroup = false">
            <div class="flex justify-between items-center">
                <div>
                    <h3 class="text-2xl font-black text-slate-800">Edit Group: <span class="text-indigo-600"
                            x-text="editGroup.name"></span></h3>
                    <p class="text-slate-400 text-sm">Modify group permissions and details.</p>
                </div>
                <button @click="showEditGroup = false"
                    class="text-slate-400 hover:text-slate-600 p-2 hover:bg-slate-100 rounded-full transition-all">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <form @submit.prevent="updateGroup" class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-2">Group
                            Name</label>
                        <input type="text" x-model="editGroup.name"
                            class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3.5 text-sm outline-none focus:border-indigo-500 transition-all">
                    </div>
                    <div class="space-y-2">
                        <label
                            class="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-2">Description</label>
                        <input type="text" x-model="editGroup.description"
                            class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3.5 text-sm outline-none focus:border-indigo-500 transition-all">
                    </div>
                </div>

                <div class="space-y-4">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-2">Accessible
                        Tools</label>
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                        <template x-for="tool in availableTools" :key="tool.id">
                            <button type="button" @click="toggleTool(tool.id, true)"
                                :class="editGroup.tools.includes(tool.id) ? 'bg-indigo-600 text-white border-indigo-600 shadow-lg shadow-indigo-100' : 'bg-slate-50 text-slate-600 border-slate-200 hover:border-indigo-300'"
                                class="p-4 rounded-xl border text-[10px] font-bold uppercase tracking-tight transition-all text-center"
                                x-text="tool.name">
                            </button>
                        </template>
                    </div>
                </div>

                <button type="submit"
                    class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 transition-all shadow-xl active:scale-[0.98]">
                    Save Changes
                </button>
            </form>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div x-show="showEditUser" x-cloak
        class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-6">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-lg w-full shadow-2xl space-y-8 animate-in zoom-in-95 duration-200"
            @click.away="showEditUser = false">
            <div class="flex justify-between items-center">
                <h3 class="text-2xl font-black text-slate-800">Edit User: <span class="text-indigo-600"
                        x-text="editUser.username"></span></h3>
                <button @click="showEditUser = false"
                    class="text-slate-400 hover:text-slate-600 p-2 hover:bg-slate-100 rounded-full transition-all">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <form @submit.prevent="updateUser" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-2">Username
                        (Read-only)</label>
                    <input type="text" x-model="editUser.username" disabled
                        class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3.5 text-sm text-slate-400 cursor-not-allowed">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-2">Reset Password
                        (Optional)</label>
                    <input type="password" x-model="editUser.password"
                        class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3.5 text-sm outline-none focus:border-indigo-500 transition-all"
                        placeholder="New password or empty to keep current">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-2">Role</label>
                        <select x-model="editUser.role"
                            class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3.5 text-sm outline-none appearance-none cursor-pointer">
                            <option value="user">User</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-2">Group</label>
                        <select x-model="editUser.group_id"
                            class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3.5 text-sm outline-none appearance-none cursor-pointer">
                            <template x-for="g in groups" :key="g.id">
                                <option :value="g.id" x-text="g.name" :selected="g.id == editUser.group_id"></option>
                            </template>
                        </select>
                    </div>
                </div>
                <button type="submit"
                    class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 transition-all shadow-xl active:scale-[0.98]">
                    Save Changes
                </button>
            </form>
        </div>
    </div>
</div>
